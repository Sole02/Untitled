<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>음식점 목록</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1> 음식점 목록 </h1>

        <div class="input-form">
            <input type="text" id="restaurant-name" placeholder="음식점 이름 입력">
            <input type="text" id="restaurant-location" placeholder="음식점 위치(주소)">
            <button id="add-btn">등록하기</button>
        </div>

        <div id="restaurant-list" clase="card-grid">
            <div class="card">
                <h3>예시 음식점</h3>
                <p>서울시 마포구</p>
            </div>
        </div>
    </div>
</body>
</html>

</body>
</html>
